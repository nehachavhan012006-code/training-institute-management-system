<!DOCTYPE html>
<html>
<head>
    <title>TIMS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Training Institute Management System</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h3>{{ total_students }}</h3>
                    <p>Total Students</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h3>{{ total_trainers }}</h3>
                    <p>Total Trainers</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h3>{{ total_courses }}</h3>
                    <p>Total Courses</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h3>{{ total_exams }}</h3>
                    <p>Total Exams</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>

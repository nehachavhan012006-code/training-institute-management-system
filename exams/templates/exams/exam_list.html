<!DOCTYPE html>
<html>
<head>

<title>Exams</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Exam List</h1>

<a href="/exams/add/" class="btn btn-success mb-3">
Add Exam
</a>

<table class="table table-bordered">

<tr>
<th>Student</th>
<th>Course</th>
<th>Marks</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for exam in exams %}

<tr>

<td>{{ exam.student }}</td>
<td>{{ exam.course }}</td>
<td>{{ exam.marks }}</td>
<td>{{ exam.exam_date }}</td>

<td>

<a
href="/exams/edit/{{ exam.id }}/"
class="btn btn-warning btn-sm">
Edit
</a>

<a
href="/exams/delete/{{ exam.id }}/"
class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Student Results</h1>

<table class="table table-bordered">

<tr>
<th>Student</th>
<th>Course</th>
<th>Marks</th>
<th>Grade</th>
<th>Result</th>
</tr>

{% for item in results %}

<tr>

<td>{{ item.student }}</td>
<td>{{ item.course }}</td>
<td>{{ item.marks }}</td>
<td>{{ item.grade }}</td>
<td>{{ item.result }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
